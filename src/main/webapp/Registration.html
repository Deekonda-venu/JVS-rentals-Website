<!DOCTYPE html5>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Registration</title>
<link rel="shortcut icon" href="jvslogo.jpg">
<link rel="stylesheet"
	href="https://cdn.jsdelivr.net/npm/bootstrap@4.4.1/dist/css/bootstrap.min.css"
	integrity="sha384-Vkoo8x4CGsO3+Hhxv8T/Q5PaXtkKtu6ug5TOeNV6gBiFeWPGFN9MuhOf23Q9Ifjh"
	crossorigin="anonymous">
<style>
/* Same styling as your original code */
.background {
	background: linear-gradient(rgba(0, 0, 0, 0.6), rgba(0, 0, 0, 0.6)),
		url("Images/Registration_background.jpg");
	height: 729px;
}
.maindiv {
	border-radius: 20px;
	margin-top: 60px;
	height: 500px;
}
.maindiv:hover {
	background: linear-gradient(rgba(255, 255, 255, 0.4), rgba(255, 255, 255, 0.4));
}
.header {
	background-color: orange;
	height: 60px;
	width: 100%;
}
.jvs {
	position: absolute;
	top: 15px;
	left: 100px;
	font-size: 30px;
	color: white;
	font-family: 'Times New Roman', Times, serif;
	text-shadow: 2px 2px 4px black;
}
.Registration {
	padding-top: 10px;
	text-align: center;
	color: orange;
	margin-top: 5px;
	font-family: 'Times New Roman', Times, serif;
}
.all {
	margin-top: 20px;
}
.all:focus {
	border-color: orange;
	box-shadow: 0 0 10px rgba(255, 160, 122, 0.5);
	outline: none;
}
.form-check-label {
	margin-left: 30px;
	margin-top: 10px;
}
img {
	margin-top: 5px;
	margin-left: 40px;
	border-radius: 40px;
	box-shadow: 2px 2px 5px black;
}
.Contact, .About, .Home {
	position: absolute;
	top: 30px;
	text-decoration: none;
	color: white;
	font-size: 20px;
	font-family: 'Times New Roman', Times, serif;
}
.Contact { right: 250px; }
.About { right: 380px; }
.Home { right: 470px; }
.login {
	position: absolute;
	right: 40px;
	top: 17px;
	background-color: white;
	color: orange;
	border: 2px solid white;
	border-radius: 2px;
	padding: 3px 10px;
	font-family: 'Times New Roman', Times, serif;
}
.login:focus {
	outline: none;
	background-color: rgb(193, 201, 209);
}
.label {
	color: orange;
}
</style>
</head>
<body>
	<div class="background">
		<div class="header">
			<form action="login.html">
				<button type="submit" class="login"><b>Log-In</b></button>
			</form>
			<img src="Images/JVS2O.jpg" height="50px" width="50px;">
			<h3 class="jvs"><b>RENTALS</b></h3>
			<h5 class="Contact"><a href="#" style="color: white;">Contact Us</a></h5>
			<h5 class="About"><a href="#" style="color: white;">About</a></h5>
			<h5 class="Home"><a href="#" style="color: white;">Home</a></h5>
		</div>

		<form action="Registration" method="post" class="form-group">
			<div class="container-fluid">
				<div class="row">
					<div class="col-md-3"></div>
					<div class="col-md-6 maindiv" id="maindiv">
						<h2 class="Registration"><b>Sign-Up</b></h2>

						<div class="row">
							<div class="col-md-1"></div>
							<div class="col-md-5">
								<input type="text" name="Firstname" id="firstName" class="form-control all" placeholder="FIRST NAME" required>
							</div>
							<div class="col-md-5">
								<input type="text" name="Lastname" id="lastName" class="form-control all" placeholder="LAST NAME" required>
							</div>
							<div class="col-md-1"></div>
						</div>

						<div class="row">
							<div class="col-md-1"></div>
							<div class="col-md-5">
								<input type="email" name="email" id="email" class="form-control all" placeholder="EMAIL" required>
							</div>
							<div class="col-md-5">
								<input type="tel" name="mobilenumber" id="mobile" class="form-control all" placeholder="MOBILE NUMBER" required>
							</div>
							<div class="col-md-1"></div>
						</div>

						<div class="row">
							<div class="col-md-1"></div>
							<div class="col-md-5">
								<input type="password" name="Password" id="password" class="form-control all" placeholder="PASSWORD" required>
							</div>
							<div class="col-md-5">
								<input type="password" name="confirmPassword" id="confirmPassword" class="form-control all" placeholder="CONFIRM PASSWORD" required>
							</div>
							<div class="col-md-1"></div>
						</div>

						<div class="row">
							<div class="col-md-1"></div>
							<div class="col-md-6">
								<label class="form-check-label label"><input type="radio" name="gender" value="Male" checked> Male</label>
								<label class="form-check-label label"><input type="radio" name="gender" value="Female"> Female</label>
								<label class="form-check-label label"><input type="radio" name="gender" value="Other"> Other</label>
							</div>
							<div class="col-md-5"></div>
						</div>

						<div class="row">
							<div class="col-md-1"></div>
							<div class="col-md-11">
								<div class="row">
									<div class="col-md-1">
										<label for="birthday" class="all label" style="margin-top: 15px;">DOB:</label>
									</div>
									<div class="col-md-4">
										<input type="date" name="date_of_birth" id="birthday" class="form-control" required>
									</div>
									<div class="col-md-7"></div>
								</div>
							</div>
						</div>

						<div class="row">
							<div class="col-md-1"></div>
							<div class="col-md-5">
								<label for="checkbox" class="label" style="margin-left: 10px; margin-top: 10px;">License</label>
								<input type="checkbox" name="license" id="Checkbox">
							</div>
							<div class="col-md-6">
								<button type="submit" id="submit" class="form-control all" style="background-color: orange; color: white; width: 100px;">SUBMIT</button>
							</div>
						</div>

					</div>
					<div class="col-md-3"></div>
				</div>
			</div>
		</form>
	</div>
	
	<script>
document.getElementById("submit").addEventListener("click", function (e) {
	
     // Prevent actual form submission

    let isValid = true;

    // Get values
    const firstName = document.getElementById("firstName").value.trim();
    const lastName = document.getElementById("lastName").value.trim();
    const email = document.getElementById("email").value.trim();
    const mobile = document.getElementById("mobile").value.trim();
    const password = document.getElementById("password").value;
    const confirmPassword = document.getElementById("confirmPassword").value;
    const dob = document.getElementById("birthday").value;
    const license = document.getElementById("Checkbox").checked;

    // Error elements
    const p1 = document.getElementById("p1");
    const p2 = document.getElementById("p2");
    const p3 = document.getElementById("p3");
    const p4 = document.getElementById("p4");
    const p5 = document.getElementById("p5");
    const p6 = document.getElementById("p6");
    const p7 = document.getElementById("p7");
    const p8 = document.getElementById("p8");

    // Clear previous errors
    [p1, p2, p3, p4, p5, p6, p7, p8].forEach(p => p.innerText = "");

    // First name validation
    if (!/^[a-zA-Z]+$/.test(firstName)) {
        p1.innerText = "Enter a valid first name.";
        
        isValid = false;

    }

    // Last name validation
    if (!/^[a-zA-Z]+$/.test(lastName)) {
        p2.innerText = "Enter a valid last name.";
        isValid = false;
    }

    // Email validation
    if (!/^\S+@\S+\.\S+$/.test(email)) {
        p3.innerText = "Enter a valid email.";
        isValid = false;
    }

    // Mobile validation
    if (!/^\d{10}$/.test(mobile)) {
        p4.innerText = "Enter a 10-digit mobile number.";
        isValid = false;
    }

    // Password validation
    if (password.length < 6) {
        p5.innerText = "Password must be at least 6 characters.";
        isValid = false;
    }

    // Confirm password validation
    if (password !== confirmPassword) {
        p6.innerText = "Passwords do not match.";
        isValid = false;
    }

    // Gender validation
    const male = document.getElementById("radio1").checked;
    const female = document.getElementById("radio2").checked;
    const other = document.getElementById("radio3").checked;
    if (!male && !female && !other) {
        p7.innerText = "Please select a gender.";
        isValid = false;
    }

    // DOB validation
    if (!dob) {
        p8.innerText = "Please enter your date of birth.";
        isValid = false;
    }

    // License checkbox validation
    if (!license) {
        alert("You must agree to having a license.");
        isValid = false;
    }
    if(isValid == false){
        document.getElementById("maindiv").style.height = "600px";
    }
    // Submit if valid
    if (isValid) {
        alert("Form submitted successfully!");
        document.forms[1].submit(); // Submit the actual form
    }
    
});
</script>s
</body>
</html>
