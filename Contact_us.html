						required />
				</div>

					<label for="message">Your Message:</label>

		<script>
			var a;

			window.onload = function() {
				a = 0;
				document.querySelector(".navbar-toggler").onclick = toggleMenu;
				document.getElementById("close").onclick = toggleMenu;
			};

			function toggleMenu() {
				console.log("jj");
				if (a == 0) {
					document.getElementById('menu').style.left = "0px";
					document.getElementById('menu').style.transition = "all 1s";
					document.getElementById("menu").style.zIndex = 999;
					a++;
				} else {
					document.getElementById('menu').style.left = "-250px";
					document.getElementById('menu').style.transition = "all 1s";
					a = 0;
				}
			}
